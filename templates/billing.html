<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账单中心 - AI短剧创作智能体</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css?v=20260412_float_drag_1" />
</head>

<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <button id="btn-project-drawer" class="project-drawer-toggle" title="管理项目" aria-label="管理项目">
        项
    </button>

    <aside id="project-drawer" class="project-drawer" aria-hidden="true">
        <div class="project-drawer-head">
            <h3>项目管理</h3>
            <button id="btn-project-drawer-close" class="project-drawer-close">关闭</button>
        </div>

        <div class="project-drawer-tools">
            <button id="btn-new-project">新建项目</button>
            <button id="btn-delete-project" class="danger">删除当前项目</button>
            <button id="btn-duplicate-project" class="secondary">复制当前项目</button>
            <button id="btn-save-snapshot" class="secondary">保存快照</button>
        </div>

        <div id="project-current-meta" class="project-current-meta">
            <p class="hint">当前项目信息将在这里显示。</p>
        </div>

        <div id="project-save-status" class="project-save-status hint"></div>

        <div id="project-list" class="project-list"></div>

        <section class="project-snapshot-panel">
            <div class="project-snapshot-head">
                <h4>项目快照</h4>
                <button id="btn-refresh-snapshots" class="secondary">刷新</button>
            </div>
            <div id="project-snapshot-status" class="hint"></div>
            <div id="project-snapshot-list" class="project-snapshot-list">
                <p class="hint">暂无快照</p>
            </div>
        </section>
    </aside>

    <div id="edit-project-modal" class="edit-project-modal">
        <div class="edit-project-dialog">
            <h3>编辑项目信息</h3>
            <form class="edit-project-form" id="edit-project-form">
                <div class="form-group">
                    <label for="edit-project-name">项目名称</label>
                    <input type="text" id="edit-project-name" placeholder="输入项目名称" required>
                </div>
                <div class="form-group">
                    <label for="edit-project-creator">创建人</label>
                    <input type="text" id="edit-project-creator" placeholder="输入创建人名称">
                </div>
                <div class="form-group">
                    <label for="edit-project-description">项目描述</label>
                    <textarea id="edit-project-description" placeholder="项目描述示例：都市悬疑 / 情感反转 / 成长励志"></textarea>
                </div>
                <div class="edit-project-actions">
                    <button type="button" class="btn-cancel" id="btn-edit-cancel">取消</button>
                    <button type="button" class="btn-save" id="btn-edit-save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <main class="container">
        <nav class="top-nav">
            <a href="/" class="brand" aria-label="AIT 首页">
                <span class="brand-mark" aria-hidden="true">AIT</span>
                <span class="brand-text">AIT 创作引擎</span>
            </a>
            <div class="nav-links">
                <a href="/studio">创作工坊</a>
                <a href="/visual">可视化编辑</a>
                <a href="/export-center">导出中心</a>
                <a href="/video-lab">视频实验室</a>
                <a class="active" href="/billing">账单中心</a>
            </div>
        </nav>

        <header class="hero compact">
            <h1>账单中心</h1>
            <p>可视化展示当前成本、账单明细和付费接口状态。</p>
        </header>

        <section class="panel soft">
            <div class="grid two billing-summary-grid">
                <article class="billing-card">
                    <div class="billing-card-head">
                        <h3>成本总览</h3>
                        <button id="btn-billing-clear" class="secondary cost-widget-clear" type="button">清零</button>
                    </div>
                    <div id="billing-summary" class="billing-summary"></div>
                </article>
                <article class="billing-card">
                    <h3>付费接口</h3>
                    <p id="billing-interface-status" class="hint">当前接口状态：未开通</p>
                    <div class="billing-wallet">
                        <div class="billing-wallet-balance">
                            <strong>当前剩余</strong>
                            <span id="billing-wallet-balance">¥0.00</span>
                        </div>
                        <div class="billing-wallet-actions">
                            <input id="billing-recharge-amount" type="number" min="1" step="1" value="50" aria-label="充值金额">
                            <button id="btn-billing-recharge" type="button">充值</button>
                            <button id="btn-billing-test-add" class="secondary" type="button">测试增加 ¥10</button>
                        </div>
                    </div>
                    <button id="btn-billing-enable" class="secondary">开通付费接口</button>
                    <p class="hint" style="margin-top: 12px;">当前为本地测试余额，后端真实充值与扣费逻辑尚未接入。</p>
                </article>
            </div>
        </section>

        <section class="panel">
            <h2>成本分布</h2>
            <div class="billing-chart-grid">
                <article class="billing-card">
                    <h3>类型占比</h3>
                    <div id="billing-pie-chart" class="billing-pie-chart"></div>
                </article>
                <article class="billing-card">
                    <h3>阶段成本</h3>
                    <div id="billing-bar-chart" class="billing-bar-chart"></div>
                </article>
            </div>
        </section>

        <section class="panel">
            <h2>账单明细</h2>
            <div id="billing-records" class="billing-records"></div>
        </section>
    </main>

    <div id="billing-payment-modal" class="billing-payment-modal" aria-hidden="true">
        <div class="billing-payment-dialog">
            <div class="billing-payment-head">
                <div>
                    <h3>微信支付充值</h3>
                    <p id="billing-payment-amount" class="hint">充值金额：¥0.00</p>
                </div>
                <button id="btn-billing-payment-close" class="secondary" type="button">退出</button>
            </div>
            <img src="/static/payment/wechat-pay.png" alt="微信支付二维码" class="billing-payment-image">
            <button id="btn-billing-payment-done" type="button">支付完毕</button>
            <p class="hint">测试模式：点击“支付完毕”后会把本次充值金额加入当前余额。</p>
        </div>
    </div>

    <script src="/static/app.js?v=20260418_long_chain_fix_1"></script>
</body>

</html>
